<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Happy Birthday Pari</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow:hidden;height:100vh;width:100vw}
body{
  background:radial-gradient(ellipse at 50% 0%,#2d1854 0%,#1a0b2e 45%,#0a0414 100%);
  font-family:'Georgia','Iowan Old Style',serif;
  color:#f3e8ff;
  position:relative;
}

/* ---------- ambient stars ---------- */
.star{position:absolute;color:#ffffff55;pointer-events:none;animation:twinkle 3.5s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.8}}

.glow-orb{
  position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;opacity:.35;
}
#orb1{width:380px;height:380px;background:#ff6fa3;top:-120px;left:-120px}
#orb2{width:420px;height:420px;background:#7c5cff;bottom:-150px;right:-120px}

/* ---------- scene & text ---------- */
#scene{
  position:fixed;inset:0;display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;
  padding:24px;z-index:2;
}
.line{
  opacity:0;font-size:clamp(1.15rem,4vw,1.65rem);margin:9px 0;
  letter-spacing:.3px;font-weight:400;color:#f3e8ff;
  text-shadow:0 2px 18px rgba(0,0,0,.4);
  max-width:680px;
}
.show{animation:fade 1.7s ease-out forwards}
@keyframes fade{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}

#pari{
  font-size:clamp(3rem,11vw,6.2rem);
  background:linear-gradient(135deg,#ffe9a8,#ffd166 45%,#ff9ecb);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 26px rgba(255,209,102,.55));
  opacity:0;font-weight:700;letter-spacing:2px;
}
.reveal{animation:reveal 2.1s ease-out forwards}
@keyframes reveal{from{opacity:0;letter-spacing:24px;transform:scale(.92)}to{opacity:1;letter-spacing:2px;transform:scale(1)}}

button{
  display:none;margin-top:22px;padding:16px 36px;border:none;border-radius:50px;
  background:linear-gradient(135deg,#ff6fa3,#ff4f8b);
  color:#fff;font-size:1.05rem;font-family:inherit;letter-spacing:.4px;
  box-shadow:0 8px 28px rgba(255,79,139,.45), 0 0 0 1px rgba(255,255,255,.08) inset;
  cursor:pointer;transition:transform .25s, box-shadow .25s;
}
button:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 12px 34px rgba(255,79,139,.6)}
button:active{transform:translateY(0) scale(.98)}

/* ---------- gift ---------- */
#gift{
  display:none;position:fixed;left:50%;transform:translateX(-50%);bottom:-400px;
  font-size:clamp(140px,28vw,240px);transition:bottom 1.8s cubic-bezier(.34,1.56,.64,1);
  filter:drop-shadow(0 10px 30px rgba(0,0,0,.5));cursor:pointer;z-index:3;
}
#gift.rise{bottom:18%}
.shake1{animation:shake1 .5s}
.shake2{animation:shake2 .6s}
@keyframes shake1{25%{transform:translateX(-50%) rotate(-5deg)}75%{transform:translateX(-50%) rotate(5deg)}}
@keyframes shake2{20%{transform:translateX(-50%) rotate(-10deg)}40%{transform:translateX(-50%) rotate(10deg)}60%{transform:translateX(-50%) rotate(-8deg)}}
#gift-hint{
  position:fixed;bottom:10%;left:50%;transform:translateX(-50%);
  font-size:.95rem;color:#f3e8ffaa;opacity:0;animation:fade 1.5s ease-out 2.2s forwards;
  z-index:3;letter-spacing:.3px;
}

/* ---------- big screen surprise shake ---------- */
.impact-shake { animation: impact 0.4s ease-out; }
@keyframes impact {
  0%, 100% { transform: none; }
  15% { transform: translate(-8px, 6px) rotate(-1deg); }
  30% { transform: translate(8px, -6px) rotate(1deg); }
  45% { transform: translate(-5px, -4px); }
  60% { transform: translate(5px, 4px); }
  75% { transform: translate(-2px, 2px); }
}

/* ---------- confetti fountain blasts ---------- */
.conf{position:fixed;font-size:26px;animation:blast 2.2s cubic-bezier(.1,.8,.25,1) forwards;z-index:5;pointer-events:none;}
@keyframes blast{
  0% { transform: translate(0, 0) rotate(0deg) scale(0.5); opacity: 1; }
  20% { opacity: 1; }
  100%{transform:translate(var(--x),var(--y)) rotate(1080deg) scale(1.2);opacity:0}
}

/* ---------- grand cake build stage ---------- */
#cake-stage{
  display:none;position:fixed;left:50%;bottom:5%;transform:translateX(-50%);
  width:min(95vw,620px);z-index:3;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.layer{
  margin:0 auto;opacity:0;position:relative;
  transform:translateY(-300px) scale(.7);
  border-radius:24px;
  box-shadow:0 14px 32px rgba(0,0,0,.45), inset 0 -14px 22px rgba(0,0,0,.22), inset 0 8px 14px rgba(255,255,255,.25);
  z-index: 2;
}
.layer.drop{animation:dropIn .65s cubic-bezier(.15, 1.1, 0.4, 1.25) forwards}
@keyframes dropIn{
  0%{opacity:0;transform:translateY(-300px) scale(.75)}
  65%{opacity:1;transform:translateY(10px) scale(1.03)}
  85%{transform:translateY(-4px) scale(.98)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
.layer.bump{animation:bump .3s ease-out}
@keyframes bump{0%{transform:translateY(0) scaleX(1)}40%{transform:translateY(6px) scaleX(1.05)}100%{transform:translateY(0) scaleX(1)}}

#layer-base{height:115px;background:linear-gradient(180deg,#7a4a9c,#5a3275);width:90%;margin-bottom: -22px;}
#layer-mid{height:95px;background:linear-gradient(180deg,#ff9ecb,#ff6fa3);width:72%;margin-bottom: -20px;}
#layer-top{height:78px;background:linear-gradient(180deg,#ffe9a8,#ffd166);width:54%;margin-bottom: -16px;}
#frosting{
  height:36px;width:56%;border-radius:24px 24px 10px 10px;
  background:linear-gradient(180deg,#fff,#ffe9f3);opacity:0;
  margin-bottom: -58px;
  z-index: 3;
}
#frosting.drop{animation:dropIn .5s cubic-bezier(.15, 1.1, 0.4, 1.25) forwards}

#candles{display:flex;justify-content:center;gap:24px;height:75px;margin-bottom:-16px;position:relative;z-index: 4;}
.candle{width:10px;height:58px;background:linear-gradient(180deg,#fff,#ffd9ec);border-radius:5px;opacity:0;position:relative;align-self:flex-end}
.candle.drop{animation:candleIn .35s ease-out forwards}
@keyframes candleIn{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}
.flame{
  position:absolute;top:-26px;left:50%;transform:translateX(-50%) scale(0);
  width:18px;height:26px;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
  background:radial-gradient(circle at 50% 70%,#fff6c8,#ffb347 60%,#ff7a30 100%);
  filter:drop-shadow(0 0 10px #ffb347);
}
.flame.lit{animation:lightUp .3s ease-out forwards, flicker 1.5s ease-in-out infinite .3s}
@keyframes lightUp{to{transform:translateX(-50%) scale(1)}}
@keyframes flicker{0%,100%{transform:translateX(-50%) scale(1) rotate(0)}25%{transform:translateX(-50%) scale(1.06) rotate(-5deg)}50%{transform:translateX(-50%) scale(.94) rotate(4deg)}75%{transform:translateX(-50%) scale(1.08) rotate(-3deg)}}

#plate{
  height:30px;width:105%;border-radius:50%;
  background:linear-gradient(180deg,#e9d8ff,#b89bd9);
  box-shadow:0 22px 40px rgba(0,0,0,.55);opacity:0;
  z-index: 1;
}
#plate.drop{animation:fade .6s ease-out forwards}

/* ---------- intensive explosion sparkles ---------- */
.sparkle{
  position:absolute;font-size:24px;opacity:0;pointer-events:none;color:#ffe9a8;
  animation:sparkleBurst 1.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
}
@keyframes sparkleBurst{
  0%{opacity:0;transform:translate(0, 0) scale(0.2); filter: drop-shadow(0 0 2px #fff);}
  25%{opacity:1;}
  100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(1.4); filter: drop-shadow(0 0 8px #ffd166);}
}

/* ---------- final caption with cosmic glowing sync ---------- */
.final{
  display:none;margin-top:26px;font-size:clamp(1.5rem,6vw,2.4rem);
  background:linear-gradient(135deg,#ffe9a8,#ffd166,#ff9ecb);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  font-weight:700;text-align:center;
  animation: textTwinkle 3.5s ease-in-out infinite;
}
@keyframes textTwinkle {
  0%, 100% { filter:drop-shadow(0 0 12px rgba(255,209,102,.35)); opacity: 0.9; }
  50% { filter:drop-shadow(0 0 30px rgba(255,209,102,0.75)); opacity: 1; transform: scale(1.01); }
}
.final .sub{
  display:block;font-size:.42em;margin-top:14px;color:#f3e8ffcc;
  -webkit-text-fill-color:#f3e8ffcc;font-style:italic;font-weight:400;
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
}
</style></head><body>
<div class="glow-orb" id="orb1"></div>
<div class="glow-orb" id="orb2"></div>
<div id="scene"></div>
<div id="gift">🎁</div>
<div id="gift-hint"></div>

<!-- Background Audio configured for your file -->
<audio id="bg-music" loop>
  <source src="maksymmalko-happy-birthday-334876.mp3" type="audio/mpeg">
</audio>

<script>
/* ambient stars */
for(let i=0;i<90;i++){
  let s=document.createElement('div');
  s.className='star';
  s.innerHTML=Math.random()>.7?'✧':'✦';
  s.style.left=Math.random()*100+'vw';
  s.style.top=Math.random()*100+'vh';
  s.style.fontSize=(8+Math.random()*10)+'px';
  s.style.animationDelay=(Math.random()*3)+'s';
  document.body.appendChild(s);
}

const scene=document.getElementById('scene');
const lines=[
  "Happy Birthday, Pari! 🎉",
  "Another year older, hopefully a little wiser. 🤫",
  "A simple WhatsApp text or Instagram story felt way too basic for today...",
  "So I figured I'd use my skills to make you something a bit different. 💻",
  "No cheesy speeches from me—I'll just let the code do the talking.",
  "Check out what I built for you..."
];
let d=0;
lines.forEach(t=>{
  setTimeout(()=>{
    let e=document.createElement('div');
    e.className='line show';
    e.textContent=t;
    scene.appendChild(e);
  }, d);
  d+=2500;
});
setTimeout(()=>{
  let p=document.createElement('div');
  p.id='pari';p.className='reveal';p.textContent='PARI ❤️';
  scene.appendChild(p);
},d);
d+=3000;
setTimeout(()=>{
  let b=document.createElement('button');
  b.style.display='inline-block';
  b.innerHTML='🎁 Open Your Surprise';
  b.onclick=startGift;
  scene.appendChild(b);
},d);

function startGift(){
  const music = document.getElementById('bg-music');
  if(music) {
    music.volume = 0.7; 
    music.play().catch(err => console.log("Audio skipped by browser permissions.", err));
  }

  scene.innerHTML='';
  let g=document.getElementById('gift');
  g.style.display='block';
  setTimeout(()=>g.classList.add('rise'),100);

  let hint=document.getElementById('gift-hint');
  hint.textContent='tap the gift ✨';

  let c=0;
  g.onclick=()=>{
    c++;
    if(c==1){g.classList.add('shake1');setTimeout(()=>g.classList.remove('shake1'),500);}
    if(c==2){g.classList.add('shake2');setTimeout(()=>g.classList.remove('shake2'),600);}
    if(c>=3){g.onclick=null;hint.style.display='none';openGift();}
  };
}

function triggerPopperFountain(side, count) {
  const icons=['🎊','✨','💖','🌸','🎉','⭐','🍿'];
  for(let i=0; i<count; i++) {
    let e=document.createElement('div');
    e.className='conf';
    e.textContent=icons[Math.floor(Math.random()*icons.length)];
    e.style.left=(side === 'left' ? '-20px' : 'calc(100vw + 20px)');
    e.style.top=(60 + Math.random()*20)+'vh';
    
    let xVelocity = (side === 'left') ? (350 + Math.random()*450) : (-350 - Math.random()*450);
    let yVelocity = (-450 - Math.random()*350);
    
    e.style.setProperty('--x', xVelocity+'px');
    e.style.setProperty('--y', yVelocity+'px');
    e.style.fontSize=(20 + Math.random()*18)+'px';
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),2200);
  }
}

function triggerImpactSparkles(elementY, count) {
  let stage = document.getElementById('cake-stage');
  if(!stage) return;
  for(let i=0;i<count;i++){
    let sp=document.createElement('div');
    sp.className='sparkle';
    sp.textContent=Math.random()>.4?'✨':'⭐';
    sp.style.left=(10+Math.random()*80)+'%';
    sp.style.top=elementY+'px';
    sp.style.setProperty('--sx',(Math.random()*360-180)+'px');
    sp.style.setProperty('--sy',(Math.random()*-220-30)+'px');
    sp.style.animationDelay=(Math.random()*.2)+'s';
    stage.appendChild(sp);
    setTimeout(()=>sp.remove(),1500);
  }
}

function shakeScreen() {
  document.body.classList.add('impact-shake');
  setTimeout(()=>document.body.classList.remove('impact-shake'),400);
}

function openGift(){
  shakeScreen();
  triggerPopperFountain('left', 40);
  triggerPopperFountain('right', 40);
  
  let g=document.getElementById('gift');
  g.innerHTML='🎁✨';

  let dynamicBlast = setInterval(()=>{
    triggerPopperFountain('left', 12);
    triggerPopperFountain('right', 12);
  }, 450);

  setTimeout(()=>{
    clearInterval(dynamicBlast);
    g.style.display='none';
    buildCake();
  },1200);
}

function buildCake(){
  let stage=document.createElement('div');
  stage.id='cake-stage';
  stage.style.display='flex';
  document.body.appendChild(stage);
  
  stage.innerHTML=`
    <div id="candles">
      <div class="candle" id="c1"><div class="flame" id="f1"></div></div>
      <div class="candle" id="c2"><div class="flame" id="f2"></div></div>
      <div class="candle" id="c3"><div class="flame" id="f3"></div></div>
    </div>
    <div id="frosting"></div>
    <div class="layer" id="layer-top"></div>
    <div class="layer" id="layer-mid"></div>
    <div class="layer" id="layer-base"></div>
    <div id="plate"></div>
  `;

  const seq=[
    [()=>{ id('plate').classList.add('drop'); },0],
    [()=>{ id('layer-base').classList.add('drop'); },250],
    [()=>{ bump('layer-base'); shakeScreen(); triggerImpactSparkles(230, 25); },850],
    [()=>{ id('layer-mid').classList.add('drop'); },1050],
    [()=>{ bump('layer-mid'); shakeScreen(); triggerImpactSparkles(140, 20); },1650],
    [()=>{ id('layer-top').classList.add('drop'); },1850],
    [()=>{ bump('layer-top'); shakeScreen(); triggerImpactSparkles(70, 20); },2450],
    [()=>{ id('frosting').classList.add('drop'); },2600],
    [()=>{ id('c1').classList.add('drop'); id('c2').classList.add('drop'); id('c3').classList.add('drop'); },2950],
    [()=>{ id('f1').classList.add('lit'); },3450],
    [()=>{ id('f2').classList.add('lit'); },3650],
    [()=>{ id('f3').classList.add('lit'); },3850],
    [()=>{ 
       triggerPopperFountain('left', 35); 
       triggerPopperFountain('right', 35); 
       triggerImpactSparkles(20, 35); 
    },4350],
    [()=>{ showFinal(); },5100],
  ];
  seq.forEach(([fn,t])=>setTimeout(fn,t));
}
function id(x){return document.getElementById(x)}
function bump(elId){
  let el=id(elId);
  el.classList.add('bump');
  setTimeout(()=>el.classList.remove('bump'),300);
}

function showFinal(){
  let f=document.createElement('div');
  f.className='final';
  f.style.display='block';
  f.innerHTML='Happy Birthday Pari ❤️<span class="sub">May all your dreams come true ✨<br>— Your Coder Brother 💻</span>';
  document.getElementById('scene').appendChild(f);
}
</script></body></html>
